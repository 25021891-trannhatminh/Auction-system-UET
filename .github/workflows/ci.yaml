name: CI/CD for Auction System

on:
  push:
    branches: [ main, dev , Refactor]
#  pull_request:
#    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn verify

      - name: Package application
        run: mvn package -DskipTests

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-jar
          path: client/target/*.jar
        if: success()

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/target/*.jar
        if: success()

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auction-system-jars
          path: |
            server/target/auction-server.jar
            client/target/auction-client.jar
          if-no-files-found: error
